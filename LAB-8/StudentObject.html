<!doctype html>
<html>
  <head>
    <title>Student Object</title>
  </head>
  <body>
    <div align="center">
      <div id="out"></div>
    </div>
    <script>
      const student = {
        id: 101,
        name: "Priya",
        department: "CSE",
        marks: 92,
      };
      const { id, name, department, marks } = student;

      const updatedStudent = {
        ...student,
        grade: "A",
      };
      let objStr = JSON.stringify(updatedStudent);
      document.getElementById("out").innerHTML = `
        ${id} ${name} ${department} ${marks} <br>
        ${objStr}
      `;
    </script>
  </body>
</html>
