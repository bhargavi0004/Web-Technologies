<!doctype html>
<html>
  <head>
    <title>Average Calculator</title>
    <style></style>
  </head>
  <body>
    <div align="center">
      <h2>Finding average</h2>

      <input id="name" placeholder="name" /><br /><br />
      <input id="mark1" type="number" placeholder="mark1" /><br /><br />
      <input id="mark2" type="number" placeholder="mark2" /><br /><br />
      <input id="mark3" type="number" placeholder="mark3" /><br /><br />
      <br />
      <button align="center" onclick="print()">Find Average</button><br /><br />
      <div id="average"></div>
    </div>
  </body>
</html>
<script>
  let studentName = document.getElementById("name");
  let mark1 = document.getElementById("mark1");
  let mark2 = document.getElementById("mark2");
  let mark3 = document.getElementById("mark3");

  const calculateTotal = (m1, m2, m3) => {
    return m1 + m2 + m3;
  };

  const calculateAverage = (m1, m2, m3) => {
    return (m1 + m2 + m3) / 3;
  };

  let print = () => {
    let m1 = Number(mark1.value);
    let m2 = Number(mark2.value);
    let m3 = Number(mark3.value);
    let total = calculateTotal(m1, m2, m3);
    let average = calculateAverage(m1, m2, m3);
    document.getElementById("average").innerHTML = `
      Student Name: ${studentName.value}<br>
      Total marks: ${total}<br>
      Average Marks: ${average}
    `;
  };
</script>
